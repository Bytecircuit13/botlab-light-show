<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" width="100%" height="100%">
  <!-- Definitions for gradients and glows -->
  <defs>
    <!-- Cyan to Blue Gradient -->
    <linearGradient id="cyanBlueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#2962FF" />
    </linearGradient>
    
    <!-- Neon Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Logo Mark (Swarm/Drone Icon) -->
  <g transform="translate(10, 10)">
    <!-- Central Drone Core -->
    <circle cx="30" cy="30" r="8" fill="url(#cyanBlueGrad)" filter="url(#glow)" />
    <!-- Orbiting Swarm Nodes -->
    <circle cx="30" cy="10" r="3" fill="#00E5FF" />
    <circle cx="50" cy="20" r="3.5" fill="#00E5FF" opacity="0.8" />
    <circle cx="45" cy="45" r="2.5" fill="#2962FF" />
    <circle cx="15" cy="40" r="3" fill="#00E5FF" />
    <circle cx="10" cy="20" r="2" fill="#2962FF" opacity="0.7" />
    
    <!-- Thin constellation lines -->
    <line x1="30" y1="30" x2="30" y2="10" stroke="#00E5FF" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.6" />
    <line x1="30" y1="30" x2="50" y2="20" stroke="#00E5FF" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.6" />
    <line x1="30" y1="30" x2="45" y2="45" stroke="#2962FF" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.6" />
    <line x1="30" y1="30" x2="15" y2="40" stroke="#00E5FF" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.6" />
    <line x1="30" y1="30" x2="10" y2="20" stroke="#2962FF" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.6" />
  </g>

  <!-- Logo Text -->
  <g transform="translate(85, 0)">
    <!-- "BOTLAB" Text -->
    <text x="0" y="42" font-family="'Exo', 'Inter', sans-serif" font-weight="900" font-size="28" fill="#FFFFFF" letter-spacing="4">
      BOTLAB
    </text>
    <!-- "DYNAMICS" Text -->
    <text x="135" y="42" font-family="'Exo', 'Inter', sans-serif" font-weight="300" font-size="28" fill="#00E5FF" letter-spacing="6" filter="url(#glow)">
      DYNAMICS
    </text>
    <!-- Subtitle -->
    <text x="2" y="60" font-family="'Exo', 'Inter', sans-serif" font-weight="400" font-size="9" fill="#FFFFFF" opacity="0.5" letter-spacing="8">
      SWARM ROBOTICS &amp; LIGHT SHOWS
    </text>
  </g>
</svg>
